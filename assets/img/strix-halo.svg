<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200" role="img" aria-label="AMD Strix Halo workstation: a compact Ryzen AI Max mini-PC.">
  <rect width="320" height="200" rx="12" fill="#eaeef2" />
  <!-- Compact mini-PC body -->
  <g>
    <rect x="86" y="72" width="148" height="80" rx="8" fill="#2b3038" stroke="#171a1f" stroke-width="2" />
    <rect x="86" y="72" width="148" height="80" rx="8" fill="url(#strixGrad)" />
    <!-- Front vent slots -->
    <g fill="#454c56">
      <rect x="98" y="86" width="6" height="52" rx="3" />
      <rect x="110" y="86" width="6" height="52" rx="3" />
      <rect x="122" y="86" width="6" height="52" rx="3" />
    </g>
    <!-- Accent bar -->
    <rect x="140" y="86" width="82" height="6" rx="3" fill="#d1453b" />
    <!-- Ports -->
    <circle cx="150" cy="132" r="5" fill="#6a7280" />
    <circle cx="168" cy="132" r="5" fill="#6a7280" />
    <rect x="184" y="127" width="26" height="10" rx="3" fill="#6a7280" />
    <!-- Power indicator -->
    <circle cx="215" cy="132" r="3" fill="#5fbf6b" />
  </g>
  <defs>
    <linearGradient id="strixGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a414b" />
      <stop offset="1" stop-color="#232830" />
    </linearGradient>
  </defs>
</svg>
