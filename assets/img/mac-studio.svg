<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200" role="img" aria-label="Mac Studio: a compact square aluminum desktop computer.">
  <rect width="320" height="200" rx="12" fill="#e9edf2" />
  <!-- Compact square aluminum body -->
  <g>
    <rect x="96" y="66" width="128" height="90" rx="10" fill="#c7ccd3" stroke="#9aa1ab" stroke-width="2" />
    <rect x="96" y="66" width="128" height="90" rx="10" fill="url(#macGrad)" />
    <!-- Circular vent pattern on top edge -->
    <ellipse cx="160" cy="70" rx="64" ry="8" fill="#aeb5bf" />
    <!-- Front ports -->
    <circle cx="122" cy="140" r="6" fill="#7d848f" />
    <circle cx="142" cy="140" r="6" fill="#7d848f" />
    <rect x="176" y="135" width="30" height="10" rx="3" fill="#7d848f" />
    <!-- Power indicator -->
    <circle cx="160" cy="102" r="3" fill="#4c9a5a" />
  </g>
  <defs>
    <linearGradient id="macGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfe3e9" />
      <stop offset="1" stop-color="#c2c8d0" />
    </linearGradient>
  </defs>
</svg>
